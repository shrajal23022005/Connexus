<!DOCTYPE html>
<html lang="en">

<head>
    <title>Influencer Profile</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            overflow-x:hidden;
            background:
            linear-gradient(
                to right,
                #e7ab9b 50%,
                #c8d0b2 50%
            );
            position:relative;
        }

        /* NO CENTER LINE NOW */

        .main-wrapper{
            padding:60px 30px;
        }

        .page-title{
            width:fit-content;
            margin:auto;
            padding:20px 60px;
            border-radius:50px;
            background:#f6f0eb;
            color:#7b5a4d;
            font-size:3rem;
            font-weight:700;
            margin-bottom:50px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        .profile-box{
            background:rgba(255,255,255,0.18);
            backdrop-filter:blur(10px);
            border:2px dashed rgba(255,255,255,0.35);
            border-radius:40px;
            padding:50px;
            position:relative;
            overflow:hidden;
        }

        .profile-box::before{
            content:'';
            position:absolute;
            width:300px;
            height:300px;
            background:rgba(255,255,255,0.12);
            border-radius:50%;
            top:-80px;
            right:-80px;
        }

        .form-label{
            color:white;
            font-weight:600;
            margin-bottom:8px;
        }

        .form-control,
        select,
        textarea{
            background:rgba(255,255,255,0.7) !important;
            border:none !important;
            border-radius:18px !important;
            padding:14px !important;
            color:#6d4c41 !important;
            box-shadow:none !important;
        }

        .form-control:focus,
        select:focus,
        textarea:focus{
            background:white !important;
        }

        select[multiple]{
            height:220px;
        }

        .custom-btn{
            border:none;
            background:#f6f0eb;
            color:#7b5a4d;
            padding:14px 40px;
            border-radius:40px;
            font-weight:700;
            transition:0.3s;
            box-shadow:0 8px 20px rgba(0,0,0,0.12);
        }

        .custom-btn:hover{
            transform:translateY(-4px);
        }

        .search-btn{
            width:100%;
            height:52px;
        }

        .profile-preview{
            text-align:center;
        }

        #prev{
            width:170px;
            height:170px;
            object-fit:cover;
            border-radius:50%;
            border:6px solid rgba(255,255,255,0.6);
            background:white;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
        }

        .upload-box{
            margin-top:15px;
        }

        input[type="file"]{
            color:white;
        }

        textarea{
            resize:none;
        }

        @media(max-width:992px){

            body{
                background:#e7ab9b;
            }

            .page-title{
                font-size:2rem;
                padding:15px 40px;
            }

            .profile-box{
                padding:25px;
            }

        }

    </style>

    <script>
        function doPrev(fileCtrl, imgPrev) {
            let [file] = fileCtrl.files;

            if (file) {
                imgPrev.src = URL.createObjectURL(file);
            }
        }

        $(document).ready(function () {

            $("#btnsearchinf").click(function () {

                let obj = {
                    type: "get",
                    url: "/search-details",

                    headers: {
                        Authorization: "Bearer " + localStorage.getItem("token")
                    },

                    data: {
                        txtemailinf: $("#txtemailinf").val()
                    }
                };

                $.ajax(obj)

                .done(function (jsonAry) {

                    if (jsonAry.length == 0) {
                        alert("Invalid ID");
                        return;
                    }

                    $("#txtnameinf").val(jsonAry[0].iname);
                    $("#txtgenderinf").val(jsonAry[0].gender);
                    $("#dobinf").val(jsonAry[0].dob);
                    $("#txtaddinf").val(jsonAry[0].address);
                    $("#txtcityinf").val(jsonAry[0].city);
                    $("#txtphninf").val(jsonAry[0].contact);
                    $("#txtinstainf").val(jsonAry[0].insta);
                    $("#txtlinkedinf").val(jsonAry[0].fb);
                    $("#txtyoutubeinf").val(jsonAry[0].youtube);
                    $("#txtotherinfoi").val(jsonAry[0].otheri);

                    let selectedFields = jsonAry[0].fields.split(",");

                    $("#listcategoryi").val(selectedFields);

                    let imagePath = "uploads/" + jsonAry[0].picpath;

                    $("#prev").prop("src", imagePath);

                    $("#hdn").val(jsonAry[0].picpath);

                })

                .fail(function (err) {

                    alert(err.responseText || "Unauthorized Access");

                });

            });

        });

    </script>

</head>

<body>

    <div class="container-fluid main-wrapper">

        <h1 class="page-title">
            Influencer Profile
        </h1>

        <div class="container">

            <div class="profile-box">

                <form method="post"
                    enctype="multipart/form-data"
                    class="row g-4">

                    <input type="hidden"
                        name="hdn"
                        id="hdn">

                    <!-- LEFT -->

                    <div class="col-lg-9">

                        <div class="row g-4">

                            <div class="col-md-8">

                                <label class="form-label">
                                    Email ID
                                </label>

                                <input type="text"
                                    name="txtemailinf"
                                    id="txtemailinf"
                                    class="form-control">

                            </div>

                            <div class="col-md-4 d-flex align-items-end">

                                <button type="button"
                                    id="btnsearchinf"
                                    class="custom-btn search-btn">

                                    Search

                                </button>

                            </div>

                            <div class="col-md-4">

                                <label class="form-label">
                                    Name
                                </label>

                                <input type="text"
                                    name="txtnameinf"
                                    id="txtnameinf"
                                    class="form-control">

                            </div>

                            <div class="col-md-4">

                                <label class="form-label">
                                    Gender
                                </label>

                                <select name="txtgenderinf"
                                    id="txtgenderinf"
                                    class="form-control">

                                    <option value="">
                                        Select
                                    </option>

                                    <option value="male">
                                        Male
                                    </option>

                                    <option value="female">
                                        Female
                                    </option>

                                    <option value="other">
                                        Other
                                    </option>

                                </select>

                            </div>

                            <div class="col-md-4">

                                <label class="form-label">
                                    DOB
                                </label>

                                <input type="date"
                                    name="dobinf"
                                    id="dobinf"
                                    class="form-control">

                            </div>

                            <div class="col-md-4">

                                <label class="form-label">
                                    Address
                                </label>

                                <input type="text"
                                    name="txtaddinf"
                                    id="txtaddinf"
                                    class="form-control">

                            </div>

                            <div class="col-md-4">

                                <label class="form-label">
                                    City
                                </label>

                                <input type="text"
                                    name="txtcityinf"
                                    id="txtcityinf"
                                    class="form-control">

                            </div>

                            <div class="col-md-4">

                                <label class="form-label">
                                    Contact
                                </label>

                                <input type="number"
                                    name="txtphninf"
                                    id="txtphninf"
                                    class="form-control">

                            </div>

                        </div>

                    </div>

                    <!-- RIGHT -->

                    <div class="col-lg-3 profile-preview">

                        <img src=""
                            id="prev">

                        <div class="upload-box">

                            <input name="photo"
                                id="photo"
                                type="file"
                                onchange="doPrev(this, prev);">

                        </div>

                    </div>

                    <!-- CATEGORY -->

                    <div class="col-lg-4">

                        <label class="form-label">
                            Categories
                        </label>

                        <select name="listcategoryi"
                            id="listcategoryi"
                            multiple
                            class="form-control">

                            <option value="fashion">Fashion</option>
                            <option value="health">Health</option>
                            <option value="beauty">Beauty</option>
                            <option value="lifestyle">Lifestyle</option>
                            <option value="food">Food</option>
                            <option value="pet">Pet</option>
                            <option value="sports">Sports</option>
                            <option value="travel">Travel</option>
                            <option value="gaming">Gaming</option>
                            <option value="technology">Technology</option>

                        </select>

                    </div>

                    <!-- SOCIALS -->

                    <div class="col-lg-8">

                        <div class="row g-4">

                            <div class="col-md-4">

                                <label class="form-label">
                                    Instagram
                                </label>

                                <input type="text"
                                    name="txtinstainf"
                                    id="txtinstainf"
                                    class="form-control">

                            </div>

                            <div class="col-md-4">

                                <label class="form-label">
                                    LinkedIn
                                </label>

                                <input type="text"
                                    name="txtlinkedinf"
                                    id="txtlinkedinf"
                                    class="form-control">

                            </div>

                            <div class="col-md-4">

                                <label class="form-label">
                                    YouTube
                                </label>

                                <input type="text"
                                    name="txtyoutubeinf"
                                    id="txtyoutubeinf"
                                    class="form-control">

                            </div>

                            <div class="col-12">

                                <label class="form-label">
                                    Other Info
                                </label>

                                <textarea name="txtotherinfoi"
                                    id="txtotherinfoi"
                                    rows="5"
                                    class="form-control"></textarea>

                            </div>

                        </div>

                    </div>

                    <!-- BUTTONS -->

                    <div class="col-12 text-center mt-4">

                        <button type="submit"
                            id="btninflSave"
                            class="custom-btn">

                            Save

                        </button>

                        <button type="submit"
                            id="btninflUpdate"
                            class="custom-btn ms-3">

                            Update

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</body>

<script>

    document.addEventListener("DOMContentLoaded", function () {

        const loggedMail = localStorage.getItem("loggedmail");

        const emailInput = document.getElementById("txtemailinf");

        if (loggedMail) {

            emailInput.value = loggedMail;

        }

        emailInput.readOnly = true;

    });

</script>

<script>

    $(document).ready(function () {

        $("#btninflSave").click(function (event) {

            event.preventDefault();

            let formData = new FormData($("form")[0]);

            $.ajax({

                type: "POST",

                url: "/influencer-save",

                data: formData,

                contentType: false,

                processData: false,

                success: function (response) {

                    alert(response);

                },

                error: function (err) {

                    alert("Error: " + err.statusText);

                },

            });

        });

        $("#btninflUpdate").click(function (event) {

            event.preventDefault();

            let formData = new FormData($("form")[0]);

            $.ajax({

                type: "POST",

                url: "/influencer-update",

                data: formData,

                contentType: false,

                processData: false,

                success: function (response) {

                    alert(response);

                },

                error: function (err) {

                    alert("Error: " + err.statusText);

                },

            });

        });

    });

</script>

</html>
