<!DOCTYPE html>
<html lang="en">

<head>

    <title>Manage Users</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script>
        var module = angular.module("MyModule", []);

        module.controller("MyController", function ($scope, $http) {

            const authConfig = {
                headers: {
                    Authorization: "Bearer " + localStorage.getItem("token")
                }
            };

            $scope.jsonAryAll = [];

            $scope.fillAllUsers = function () {

                let url = "/fetch-all-users";

                $http.get(url, authConfig).then(Response, Error);

                function Response(response) {
                    $scope.jsonAryAll = response.data;
                }

                function Error(err) {
                    alert(err.data || "Unauthorized Access");
                }
            };

            $scope.doDelete = function (email) {
            let url = "/del-one";

            $http.post(
                url,
                {
                    email: email
                },
                authConfig
            ).then(Response, Error);

            function Response(response) {
                alert(response.data);
                $scope.fillAllUsers();
            }

            function Error(err) {
                alert(err.data || "Delete Failed");
            }
        };

            $scope.doBlock = function (email) {

                let url = "/block-one";

                $http.post(
                    url,
                    {
                        email: email
                    },
                    authConfig
                ).then(Response, Error);

                function Response(response) {
                    alert(response.data);
                    $scope.fillAllUsers();
                }

                function Error(err) {
                    alert(err.data || "Block Failed");
                }
            };

            $scope.doResume = function (email) {

                let url = "/resume-one";

                $http.post(
                    url,
                    {
                        email: email
                    },
                    authConfig
                ).then(Response, Error);

                function Response(response) {
                    alert(response.data);
                    $scope.fillAllUsers();
                }

                function Error(err) {
                    alert(err.data || "Resume Failed");
                }
            };

        });
    </script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            background:
            linear-gradient(
                135deg,
                #f4c8bb 0%,
                #efb6a8 50%,
                #d7ddc4 50%,
                #c7cfb1 100%
            );

            padding:50px 20px;

            overflow-x:hidden;
        }

        .main-box{

            background:rgba(255,255,255,0.20);

            backdrop-filter:blur(12px);

            border-radius:40px;

            padding:40px;

            box-shadow:0 15px 40px rgba(0,0,0,0.12);
        }

        .page-title{

            text-align:center;

            font-size:3rem;

            font-weight:700;

            color:#6d5447;

            margin-bottom:35px;
        }

        .table-wrapper{

            overflow-x:auto;
        }

        table{

            width:100%;

            border-collapse:collapse;

            overflow:hidden;

            border-radius:25px;
        }

        thead{

            background:rgba(255,255,255,0.45);
        }

        th{

            padding:18px;

            text-align:center;

            color:#6d5447;

            font-size:15px;

            font-weight:700;

            border:none;
        }

        td{

            padding:18px;

            text-align:center;

            background:rgba(255,255,255,0.22);

            color:rgb(123, 81, 81);

            border:none;

            vertical-align:middle;
        }

        tr{

            border-bottom:1px solid rgba(255,255,255,0.15);
        }

        tr:hover td{

            background:rgba(255,255,255,0.30);

            transition:0.3s;
        }

        .action-btn{

            border:none;

            padding:10px 20px;

            border-radius:30px;

            font-weight:600;

            transition:0.3s;

            color:#6d5447;

            background:#f7f1eb;

            box-shadow:0 8px 18px rgba(0,0,0,0.12);
        }

        .action-btn:hover{

            transform:translateY(-3px);
        }

        .block-btn{

            background:#ffe1de;
        }

        .resume-btn{

            background:#e2f2df;
        }

        .delete-btn{

            background:#fff1d6;
        }

        .empty-box{

            text-align:center;

            padding:40px;

            color:white;

            font-size:20px;

            font-weight:500;
        }

        @media(max-width:992px){

            .main-box{

                padding:20px;
            }

            .page-title{

                font-size:2rem;
            }

            th,td{

                font-size:13px;

                padding:12px;
            }

            .action-btn{

                margin-bottom:8px;
            }

        }

    </style>

</head>

<body

    ng-app="MyModule"

    ng-controller="MyController"

    ng-init="fillAllUsers();">

    <div class="container">

        <div class="main-box">

            <h1 class="page-title">
                All Users
            </h1>

            <div class="table-wrapper">

                <table>

                    <thead>

                        <tr>

                            <th>S. No.</th>

                            <th>Email</th>

                            <th>User Type</th>

                            <th>Status</th>

                            <th>Block</th>

                            <th>Resume</th>

                            <th>Delete</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr ng-repeat="obj in jsonAryAll">

                            <td>{{ $index + 1 }}</td>

                            <td>{{ obj.email }}</td>

                            <td>{{ obj.utype }}</td>

                            <td>{{ obj.status }}</td>

                            <td>

                                <button

                                    class="action-btn block-btn"

                                    ng-click="doBlock(obj.email);">

                                    Block

                                </button>

                            </td>

                            <td>

                                <button

                                    class="action-btn resume-btn"

                                    ng-click="doResume(obj.email);">

                                    Resume

                                </button>

                            </td>

                            <td>

                                <button

                                    class="action-btn delete-btn"

                                    ng-click="doDelete(obj.email);">

                                    Delete

                                </button>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

            <div

                class="empty-box"

                ng-if="jsonAryAll.length==0">

                No Users Found

            </div>

        </div>

    </div>

</body>

</html>
