<!DOCTYPE html>
<html lang="en">

<head>

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        :root{

            --paper-red:#d89a8a;
            --paper-green:#b7c2a2;
            --paper-blue:#c6d0e7;
            --paper-peach:#dea08c;
            --paper-white:#f7f3ee;

        }

        body{

            min-height:100vh;

            overflow-x:hidden;

            color:white;

            background:
            linear-gradient(
                90deg,
                var(--paper-red) 0%,
                var(--paper-red) 50%,
                var(--paper-green) 50%,
                var(--paper-green) 100%
            );

            position:relative;

        }

        /* PAPER TEXTURE */

        body::before{

            content:"";

            position:fixed;

            inset:0;

            background:

            radial-gradient(
                rgba(255,255,255,0.08) 1px,
                transparent 1px
            ),

            radial-gradient(
                rgba(0,0,0,0.03) 1px,
                transparent 1px
            );

            background-size:28px 28px;

            opacity:0.5;

            pointer-events:none;

        }

        /* CENTER DIVIDER */

        .center-line{

            position:fixed;

            left:50%;

            top:0;

            width:12px;

            height:100%;

            background:var(--paper-white);

            transform:translateX(-50%);

            z-index:1;

        }

        /* MAIN */

        .main-container{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            position:relative;

            z-index:10;

            padding:40px;

        }

        .dashboard-box{

            width:100%;

            max-width:1200px;

            text-align:center;

        }

        .dashboard-title{

            font-size:4rem;

            font-weight:700;

            /* color:var(); */

            margin-bottom:70px;

            text-shadow:0 5px 15px rgba(0,0,0,0.1);

        }

        /* CARDS */

        .custom-card{

            background:rgba(255,255,255,0.15);

            border-radius:35px;

            padding:45px 30px;

            backdrop-filter:blur(10px);

            border:2px dashed rgba(255,255,255,0.25);

            transition:0.4s;

            position:relative;

            overflow:hidden;

            height:100%;

        }

        .custom-card:hover{

            transform:translateY(-12px) scale(1.02);

        }

        /* FLOATING CIRCLE */

        .custom-card::before{

            content:"";

            position:absolute;

            width:180px;

            height:180px;

            border-radius:50%;

            background:rgba(255,255,255,0.08);

            top:-50px;

            right:-50px;

        }

        .emoji{

            font-size:5rem;

            margin-bottom:20px;

        }

        .card-title{

            font-size:2rem;

            font-weight:700;

            color:white;

            margin-bottom:15px;

        }

        .card-text{

            color:rgba(255,255,255,0.85);

            line-height:1.7;

            margin-bottom:30px;

        }

        /* BUTTON */

        .custom-btn{

            display:inline-block;

            text-decoration:none;

            border:none;

            padding:14px 35px;

            border-radius:50px;

            background:var(--paper-white);

            color:#7d5c52;

            font-weight:700;

            transition:0.3s;

            box-shadow:
            0 10px 25px rgba(0,0,0,0.12);

        }

        .custom-btn:hover{

            transform:translateY(-5px);

            background:white;

        }

        /* RESPONSIVE */

        @media(max-width:900px){

            body{

                background:
                linear-gradient(
                    180deg,
                    var(--paper-red) 0%,
                    var(--paper-red) 50%,
                    var(--paper-green) 50%,
                    var(--paper-green) 100%
                );

            }

            .center-line{

                width:100%;

                height:12px;

                left:0;

                top:50%;

                transform:none;

            }

            .dashboard-title{

                font-size:2.8rem;

            }

        }

    </style>

</head>

<body>

    <!-- CENTER DIVIDER -->

    <div class="center-line"></div>

    <!-- MAIN -->

    <div class="container-fluid main-container">

        <div class="dashboard-box">

            <h1 class="custom-btn">

                Dashboard
            </h1>

            <div class="row g-5 justify-content-center">

                <!-- CLIENT PROFILE -->

                <div class="col-md-5">

                    <div class="custom-card">

                        <div class="emoji">
                            🏢
                        </div>

                        <h2 class="card-title">
                            Client Profile
                        </h2>

                        <p class="card-text">
                            Manage your brand profile,
                            collaborations, campaigns,
                            and influencer connections.
                        </p>

                        <a href="client-profile.html"
                            class="custom-btn">

                            Open Profile

                        </a>

                    </div>

                </div>

                <!-- FIND INFLUENCER -->

                <div class="col-md-5">

                    <div class="custom-card">

                        <div class="emoji">
                            🌟
                        </div>

                        <h2 class="card-title">
                            Find Influencer
                        </h2>

                        <p class="card-text">
                            Discover creators,
                            explore categories,
                            and connect with
                            top influencers.
                        </p>

                        <a href="infl-finder.html"
                            class="custom-btn">

                            Explore Now

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
