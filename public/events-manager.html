<!DOCTYPE html>
<html lang="en">

<head>

    <title>All Events</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script>
        var module = angular.module("MyEventsModule", []);

        var controller = module.controller("MyEventsController",
            function ($scope, $http) {

                const authConfig = {
                    headers: {
                        Authorization: "Bearer " + localStorage.getItem("token")
                    }
                };

                $scope.JsAry = [];

                $scope.fillAllevents = function () {

                    const loggedEmail = localStorage.getItem("loggedmail");

                    let url = "/fetch-all-events?email=" + loggedEmail;

                    $http.get(url, authConfig).then(Response, Error);

                    function Response(response) {
                        $scope.JsAry = response.data;
                    }

                    function Error(err) {
                        alert(err.data || "Unauthorized Access");
                    }
                };

                $scope.doDelete = function (rid) {

                    let url = "/del-one-events";

                    $http.delete(url, {
                        headers: authConfig.headers,
                        data: {
                            rid: rid
                        }
                    }).then(Response, Error);

                    function Response(response) {
                        alert(response.data);
                        $scope.fillAllevents();
                    }

                    function Error(err) {
                        alert(err.data || "Delete Failed");
                    }
                };

            });
    </script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            background:
            linear-gradient(
                135deg,
                #f6c7b8 0%,
                #efb8a9 50%,
                #d8dfc4 50%,
                #c8d0b2 100%
            );

            padding:50px 20px;

            overflow-x:hidden;
        }

        .main-box{

            background:rgba(255,255,255,0.18);

            backdrop-filter:blur(12px);

            border:2px solid rgba(255,255,255,0.3);

            border-radius:40px;

            padding:40px;

            box-shadow:0 15px 40px rgba(0,0,0,0.12);
        }

        .page-title{

            text-align:center;

            font-size:3rem;

            font-weight:700;

            color:#6d5447;

            margin-bottom:35px;
        }

        .table-wrapper{

            overflow-x:auto;
        }

        table{

            width:100%;

            border-collapse:collapse;

            overflow:hidden;

            border-radius:25px;
        }

        thead{

            background:rgba(255,255,255,0.45);
        }

        th{

            padding:18px;

            text-align:center;

            color:#6d5447;

            font-size:15px;

            font-weight:700;

            border:none;
        }

        td{

            padding:18px;

            text-align:center;

            background:rgba(255,255,255,0.22);

            color:white;

            border:none;

            vertical-align:middle;
        }

        tr{

            border-bottom:1px solid rgba(255,255,255,0.18);
        }

        tr:hover td{

            background:rgba(255,255,255,0.30);

            transition:0.3s;
        }

        .complete-btn{

            border:none;

            padding:10px 22px;

            border-radius:30px;

            background:#f7f1eb;

            color:#6d5447;

            font-weight:600;

            transition:0.3s;

            box-shadow:0 8px 18px rgba(0,0,0,0.12);
        }

        .complete-btn:hover{

            transform:translateY(-3px);
        }

        .empty-box{

            text-align:center;

            padding:40px;

            color:white;

            font-size:20px;

            font-weight:500;
        }

        @media(max-width:992px){

            .main-box{

                padding:20px;
            }

            .page-title{

                font-size:2rem;
            }

            th,td{

                font-size:13px;

                padding:12px;
            }

        }

    </style>

</head>

<body

    ng-app="MyEventsModule"

    ng-controller="MyEventsController"

    ng-init="fillAllevents();">

    <div class="container">

        <div class="main-box">

            <h1 class="page-title">
                All Events
            </h1>

            <div class="table-wrapper">

                <table>

                    <thead>

                        <tr>

                            <th>S. No.</th>

                            <th>Event ID</th>

                            <th>Event Name</th>

                            <th>Date</th>

                            <th>Time</th>

                            <th>Venue</th>

                            <th>City</th>

                            <th>Action</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr ng-repeat="obj in JsAry track by obj.rid">

                            <td>{{$index + 1}}</td>

                            <td>{{obj.rid}}</td>

                            <td>{{obj.events}}</td>

                            <td>{{obj.doe}}</td>

                            <td>{{obj.tos}}</td>

                            <td>{{obj.venue}}</td>

                            <td>{{obj.city}}</td>

                            <td>

                                <button

                                    class="complete-btn"

                                    ng-click="doDelete(obj.rid);">

                                    Complete

                                </button>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

            <div

                class="empty-box"

                ng-if="JsAry.length==0">

                No Events Found
            </div>

        </div>

    </div>

</body>

</html>
