<!DOCTYPE html>
<html lang="en">

<head>

    <title>Client Profile</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script>
        $(document).ready(function () {

            $("#btnCPsearch").click(function () {

                let obj = {
                    type: "get",
                    url: "/searchclient-details",

                    headers: {
                        Authorization: "Bearer " + localStorage.getItem("token")
                    },

                    data: {
                        CPemailinf: $("#CPemailinf").val()
                    }
                };

                $.ajax(obj)
                    .done(function (Jarray) {

                        if (Jarray.length == 0) {
                            alert("Invalid ID");
                            return;
                        }

                        $("#CPnameinf").val(Jarray[0].name);
                        $("#CPcityinf").val(Jarray[0].city);
                        $("#CPstateinf").val(Jarray[0].state);
                        $("#CPorginf").val(Jarray[0].org);
                        $("#CPmobinf").val(Jarray[0].mobile);
                    })

                    .fail(function (err) {
                        alert(err.responseText || "Unauthorized Access");
                    });

            });

        });
    </script>

    <style>

        *{

            margin:0;

            padding:0;

            box-sizing:border-box;

            font-family:'Poppins',sans-serif;

        }

        :root{

            --paper-red:#d89a8a;
            --paper-green:#b7c2a2;
            --paper-blue:#c6d0e7;
            --paper-peach:#dea08c;
            --paper-white:#f7f3ee;

        }

        body{

            min-height:100vh;

            overflow-x:hidden;

            background:
            linear-gradient(
                90deg,
                var(--paper-red) 0%,
                var(--paper-red) 50%,
                var(--paper-green) 50%,
                var(--paper-green) 100%
            );

            position:relative;

            color:white;

        }

        /* PAPER TEXTURE */

        body::before{

            content:"";

            position:fixed;

            inset:0;

            background:

            radial-gradient(
                rgba(255,255,255,0.08) 1px,
                transparent 1px
            ),

            radial-gradient(
                rgba(0,0,0,0.03) 1px,
                transparent 1px
            );

            background-size:28px 28px;

            opacity:0.5;

            pointer-events:none;

        }

        /* CENTER LINE */

        /* PAGE */

        .main-container{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            position:relative;

            z-index:10;

            padding:50px 20px;

        }

        .profile-box{

            width:100%;

            max-width:950px;

            background:rgba(255,255,255,0.15);

            backdrop-filter:blur(12px);

            border-radius:35px;

            padding:50px;

            border:2px dashed rgba(255,255,255,0.25);

            box-shadow:
            0 10px 30px rgba(0,0,0,0.12);

        }

        /* TITLE */

        .page-title{

            text-align:center;

            font-size:3.5rem;

            font-weight:700;

            margin-bottom:45px;

            color:var(--paper-white);

            text-shadow:0 4px 12px rgba(0,0,0,0.1);

        }

        /* LABEL */

        .form-label{

            font-weight:600;

            margin-bottom:10px;

            color:white;

        }

        /* INPUT */

        .form-control{

            background:rgba(255,255,255,0.18);

            border:none;

            border-radius:18px;

            padding:14px;

            color:white;

        }

        .form-control:focus{

            background:rgba(255,255,255,0.25);

            box-shadow:none;

            color:white;

        }

        .form-control::placeholder{

            color:rgba(255,255,255,0.7);

        }

        option{

            color:black;

        }

        /* BUTTON */

        .custom-btn{

            width:100%;

            border:none;

            padding:15px;

            border-radius:20px;

            background:var(--paper-white);

            color:#7d5c52;

            font-weight:700;

            transition:0.3s;

            box-shadow:
            0 10px 20px rgba(0,0,0,0.1);

        }

        .custom-btn:hover{

            transform:translateY(-4px);

        }

        /* RESPONSIVE */

        @media(max-width:900px){

            body{

                background:
                linear-gradient(
                    180deg,
                    var(--paper-red) 0%,
                    var(--paper-red) 50%,
                    var(--paper-green) 50%,
                    var(--paper-green) 100%
                );

            }

            .center-line{

                width:100%;

                height:12px;

                left:0;

                top:50%;

                transform:none;

            }

            .profile-box{

                padding:30px;

            }

            .page-title{

                font-size:2.5rem;

            }

        }

    </style>

</head>

<body>

    <!-- CENTER LINE -->

    <div class="center-line"></div>

    <!-- MAIN -->

    <div class="container-fluid main-container">

        <div class="profile-box">

            <h1 class="page-title">
                Client Profile
            </h1>

            <form method="post">

                <div class="row mb-4">

                    <div class="col-md-8">

                        <label class="form-label">
                            Email ID
                        </label>

                        <input type="text"
                            name="CPemailinf"
                            id="CPemailinf"
                            class="form-control"
                            placeholder="Enter Email">

                    </div>

                    <div class="col-md-4 d-flex align-items-end">

                        <input type="button"
                            value="Search"
                            name="btnCPsearch"
                            id="btnCPsearch"
                            class="custom-btn">

                    </div>

                </div>

                <div class="row mb-4">

                    <div class="col-md-4">

                        <label class="form-label">
                            Name
                        </label>

                        <input type="text"
                            name="CPnameinf"
                            id="CPnameinf"
                            class="form-control"
                            placeholder="Enter Name">

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">
                            City
                        </label>

                        <input type="text"
                            name="CPcityinf"
                            id="CPcityinf"
                            class="form-control"
                            placeholder="Enter City">

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">
                            State
                        </label>

                        <input type="text"
                            name="CPstateinf"
                            id="CPstateinf"
                            class="form-control"
                            placeholder="Enter State">

                    </div>

                </div>

                <div class="row mb-4">

                    <div class="col-md-6">

                        <label class="form-label">
                            Individual / Organization
                        </label>

                        <select class="form-control"
                            name="CPorginf"
                            id="CPorginf">

                            <option selected disabled value="">
                                Select
                            </option>

                            <option value="Individual">
                                Individual
                            </option>

                            <option value="Organization">
                                Organization
                            </option>

                        </select>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">
                            Contact Number
                        </label>

                        <input type="text"
                            name="CPmobinf"
                            id="CPmobinf"
                            class="form-control"
                            placeholder="Enter Contact Number">

                    </div>

                </div>

                <div class="row g-4">

                    <div class="col-md-6">

                        <input type="submit"
                            class="custom-btn"
                            formaction="/client-save"
                            value="Save">

                    </div>

                    <div class="col-md-6">

                        <input type="submit"
                            class="custom-btn"
                            formaction="/client-update"
                            value="Update">

                    </div>

                </div>

            </form>

        </div>

    </div>

</body>

<script>

    document.addEventListener("DOMContentLoaded", function () {

        const loggedMail = localStorage.getItem("loggedmail");

        const emailInput = document.getElementById("CPemailinf");

        if (loggedMail) {

            emailInput.value = loggedMail;

        }

        emailInput.readOnly = true;

    });

</script>

</html>
