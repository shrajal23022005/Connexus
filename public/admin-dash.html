<!DOCTYPE html>
<html lang="en">

<head>

    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            overflow-x:hidden;

            background:
            linear-gradient(
                135deg,
                #f6c7b8 0%,
                #efb8a9 50%,
                #d8dfc4 50%,
                #c8d0b2 100%
            );

            display:flex;

            align-items:center;

            justify-content:center;

            padding:40px 20px;
        }

        .dashboard-box{

            width:100%;

            max-width:1200px;

            background:rgba(255,255,255,0.18);

            backdrop-filter:blur(12px);

            border:2px solid rgba(255,255,255,0.25);

            border-radius:40px;

            padding:50px;

            box-shadow:0 15px 40px rgba(0,0,0,0.12);
        }

        .dashboard-title{

            text-align:center;

            font-size:3rem;

            font-weight:700;

            color:#6d5447;

            margin-bottom:50px;
        }

        .dashboard-card{

            background:rgba(255,255,255,0.22);

            border-radius:30px;

            overflow:hidden;

            border:2px solid rgba(255,255,255,0.2);

            transition:0.3s;

            height:100%;

            box-shadow:0 10px 25px rgba(0,0,0,0.08);
        }

        .dashboard-card:hover{

            transform:translateY(-8px);
        }

        .dashboard-card img{

            width:100%;

            height:280px;

            object-fit:cover;
        }

        .card-body-custom{

            padding:25px;

            text-align:center;
        }

        .card-title{

            color:#6d5447;

            font-size:1.5rem;

            font-weight:700;

            margin-bottom:20px;
        }

        .custom-btn{

            border:none;

            padding:14px 35px;

            border-radius:35px;

            background:#f6f0eb;

            color:#6d5447;

            font-weight:600;

            text-decoration:none;

            display:inline-block;

            transition:0.3s;

            box-shadow:0 8px 20px rgba(0,0,0,0.12);
        }

        .custom-btn:hover{

            transform:translateY(-4px);

            color:#6d5447;
        }

        @media(max-width:992px){

            .dashboard-title{

                font-size:2rem;
            }

            .dashboard-box{

                padding:25px;
            }

            .dashboard-card img{

                height:220px;
            }

        }

    </style>

</head>

<body>

    <div class="dashboard-box">

        <h1 class="dashboard-title">
            Admin Dashboard
        </h1>

        <div class="row g-4 justify-content-center">

            <!-- USER MANAGER -->

            <div class="col-lg-5 col-md-6">

                <div class="dashboard-card">

                    <img src="pics/user-manager-new.webp"
                        alt="User Manager">

                    <div class="card-body-custom">

                        <h3 class="card-title">
                            User Manager
                        </h3>

                        <a href="adminusers"
                            class="custom-btn">

                            Open Panel

                        </a>

                    </div>

                </div>

            </div>

            <!-- INFLUENCER CONSOLE -->

            <div class="col-lg-5 col-md-6">

                <div class="dashboard-card">

                    <img src="pics/infuencer-cnsl.webp"
                        alt="Influencer Console">

                    <div class="card-body-custom">

                        <h3 class="card-title">
                            Influencer Console
                        </h3>

                        <a href="adminallinf"
                            class="custom-btn">

                            Open Panel

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
